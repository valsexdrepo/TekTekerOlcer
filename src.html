<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tek Teker & Viraj</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            height: 100%;
            width: 100%;
            overflow: hidden;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* Kar taneleri */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .snowflake {
            position: absolute;
            top: -6px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            8% { opacity: 0.25; }
            92% { opacity: 0.25; }
            100% { transform: translateY(110vh) translateX(15px) rotate(360deg); opacity: 0; }
        }
        
        /* Glow */
        .glow {
            position: fixed;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            transition: background 0.5s ease;
        }
        .glow.teker { background: #00ff88; }
        .glow.viraj { background: #ffaa00; }
        
        /* Ekranlar */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            z-index: 1;
        }
        .hidden { display: none !important; }
        
        /* Başlangıç */
        .logo {
            font-size: 52px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 12px;
            color: #555;
            margin-bottom: 36px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* Mod kartları */
        .mode-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin: 8px auto;
            width: 240px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mode-card:active { transform: scale(0.96); }
        .mode-icon { font-size: 32px; margin-bottom: 8px; }
        .mode-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .mode-desc { font-size: 11px; color: #555; }
        
        /* Gauge */
        .gauge-wrap {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 0 auto 16px;
        }
        .gauge-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.04);
        }
        .gauge-track {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(255,255,255,0.06);
            transform: rotate(-90deg);
        }
        .gauge-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00ff88;
            transform: rotate(-90deg);
            transition: transform 0.15s ease-out, border-top-color 0.3s, filter 0.3s;
        }
        .gauge-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 124px;
            height: 124px;
            border-radius: 50%;
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .angle-num {
            font-size: 56px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }
        .angle-unit {
            font-size: 10px;
            color: #555;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        
        /* Yön oku */
        .direction {
            font-size: 12px;
            font-weight: 700;
            margin-top: 4px;
            height: 16px;
            letter-spacing: 1px;
        }
        .dir-left { color: #4488ff; }
        .dir-right { color: #ff4444; }
        .dir-straight { color: #444; }
        
        /* Maks */
        .max-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px 24px;
            display: inline-block;
            margin-bottom: 16px;
            min-width: 160px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .max-label {
            font-size: 9px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }
        .max-num {
            font-size: 28px;
            font-weight: 800;
            color: #ffaa00;
            transition: all 0.3s;
        }
        .max-sub {
            font-size: 10px;
            color: #444;
            margin-top: 4px;
        }
        
        /* Butonlar */
        .btn {
            display: block;
            width: 200px;
            margin: 0 auto 8px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
        }
        .btn-blue {
            background: rgba(68,136,255,0.1);
            color: #4488ff;
            border: 1px solid rgba(68,136,255,0.15);
        }
        .btn-red {
            background: rgba(255,68,68,0.1);
            color: #ff4444;
            border: 1px solid rgba(255,68,68,0.15);
        }
        .btn-gray {
            background: rgba(255,255,255,0.03);
            color: #555;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
        }
        
        /* Mod badge */
        .mod-badge {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.04);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10;
        }
        .mod-badge.teker { color: #00ff88; }
        .mod-badge.viraj { color: #ffaa00; }
        
        /* Footer */
        .footer {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #222;
            letter-spacing: 1px;
            z-index: 1;
        }
        
        /* Durum */
        .status {
            margin-top: 16px;
            font-size: 12px;
            color: #444;
            min-height: 18px;
        }
    </style>
</head>
<body>

<div class="snow-container" id="snowContainer"></div>
<div class="glow teker" id="glow"></div>

<!-- BAŞLANGIÇ -->
<div class="screen" id="startScreen">
    <div class="logo">🏍️</div>
    <div class="title">Tek Teker & Viraj</div>
    <div class="subtitle">Açı Ölçer</div>
    <button class="btn btn-green" id="startBtn" onclick="requestPermission()">Başlat</button>
    <div class="status" id="status"></div>
</div>

<!-- MOD SEÇİM -->
<div class="screen hidden" id="modeSelectScreen">
    <div class="logo" style="font-size: 36px; margin-bottom: 6px; animation: none;">🏍️</div>
    <div class="title" style="font-size: 18px; margin-bottom: 6px;">Mod Seç</div>
    <div class="subtitle" style="margin-bottom: 24px;">Ölçüm modunu seçin</div>
    
    <div class="mode-card" onclick="selectMode('teker')">
        <div class="mode-icon">⬆️</div>
        <div class="mode-name">Tek Teker</div>
        <div class="mode-desc">Öne kalkış açısı</div>
    </div>
    
    <div class="mode-card" onclick="selectMode('viraj')">
        <div class="mode-icon">↔️</div>
        <div class="mode-name">Viraj</div>
        <div class="mode-desc">Sağ / sol yatış açısı</div>
    </div>
</div>

<!-- ANA EKRAN -->
<div class="screen hidden" id="mainScreen">
    <div class="mod-badge teker" id="modBadge">Tek Teker</div>
    
    <div class="gauge-wrap">
        <div class="gauge-bg"></div>
        <div class="gauge-track"></div>
        <div class="gauge-fill" id="gaugeFill"></div>
        <div class="gauge-inner"></div>
        <div class="gauge-center">
            <div class="angle-num" id="angleDisplay">0</div>
            <div class="angle-unit" id="angleUnit">Derece</div>
            <div class="direction" id="direction"></div>
        </div>
    </div>
    
    <div class="max-wrap">
        <div class="max-label" id="maxLabel">Maks Açı</div>
        <div class="max-num" id="maxAngle">0°</div>
        <div class="max-sub" id="maxSub"></div>
    </div>
    
    <button class="btn btn-blue" onclick="calibrate()">Dengele</button>
    <button class="btn btn-red" onclick="reset()">Sıfırla</button>
    <button class="btn btn-gray" onclick="goToModeSelect()">Mod Değiştir</button>
</div>

<div class="footer">valsesn</div>

<script>
let currentMode = 'teker';
let maxAngle = 0;
let maxLeft = 0;
let maxRight = 0;
let calibrationOffset = 0;
let isRunning = false;
let permissionGranted = false;

// Kar taneleri
function createSnowflakes() {
    const container = document.getElementById('snowContainer');
    for (let i = 0; i < 20; i++) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        const size = Math.random() * 2 + 1;
        flake.style.width = size + 'px';
        flake.style.height = size + 'px';
        flake.style.left = Math.random() * 100 + '%';
        flake.style.animationDuration = (Math.random() * 6 + 5) + 's';
        flake.style.animationDelay = Math.random() * 8 + 's';
        container.appendChild(flake);
    }
}
createSnowflakes();

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

async function requestPermission() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    
    // Android veya eski iOS - direkt geç
    if (typeof DeviceOrientationEvent === 'undefined' || 
        typeof DeviceOrientationEvent.requestPermission !== 'function') {
        permissionGranted = true;
        goToModeSelect();
        return;
    }
    
    // iOS 13+ - izin iste (sadece bir kere)
    if (!permissionGranted) {
        try {
            setStatus('İzin isteniyor...');
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') {
                permissionGranted = true;
                goToModeSelect();
            } else {
                setStatus('İzin reddedildi');
                btn.disabled = false;
            }
        } catch (e) {
            setStatus('Hata: ' + e.message);
            btn.disabled = false;
        }
    } else {
        goToModeSelect();
    }
}

function goToModeSelect() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('modeSelectScreen').classList.remove('hidden');
}

function selectMode(mode) {
    currentMode = mode;
    document.getElementById('modeSelectScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    
    const badge = document.getElementById('modBadge');
    const glow = document.getElementById('glow');
    const maxLabel = document.getElementById('maxLabel');
    const angleUnit = document.getElementById('angleUnit');
    const maxSub = document.getElementById('maxSub');
    const direction = document.getElementById('direction');
    const fill = document.getElementById('gaugeFill');
    
    if (mode === 'teker') {
        badge.textContent = 'Tek Teker';
        badge.className = 'mod-badge teker';
        glow.className = 'glow teker';
        maxLabel.textContent = 'Maks Açı';
        angleUnit.textContent = 'Derece';
        maxSub.textContent = '';
        direction.textContent = '';
        direction.className = 'direction';
        fill.style.borderTopColor = '#00ff88';
    } else {
        badge.textContent = 'Viraj';
        badge.className = 'mod-badge viraj';
        glow.className = 'glow viraj';
        maxLabel.textContent = 'Maks Viraj';
        angleUnit.textContent = 'Derece';
        direction.textContent = 'Düz';
        direction.className = 'direction dir-straight';
        fill.style.borderTopColor = '#ffaa00';
    }
    
    reset();
    
    if (!isRunning) {
        window.addEventListener('deviceorientation', handleOrientation);
        isRunning = true;
    }
}

function handleOrientation(e) {
    if (currentMode === 'teker') {
        handleTeker(e);
    } else {
        handleViraj(e);
    }
}

function handleTeker(e) {
    let raw = e.beta || 0;
    let angle = raw - calibrationOffset;
    
    if (angle < 0) angle = 0;
    if (angle > 90) angle = 90;
    
    angle = Math.round(angle);
    document.getElementById('angleDisplay').textContent = angle;
    
    const rot = -90 + (angle / 90 * 270);
    document.getElementById('gaugeFill').style.transform = `rotate(${rot}deg)`;
    
    if (angle > maxAngle) {
        maxAngle = angle;
        document.getElementById('maxAngle').textContent = maxAngle + '°';
    }
}

function handleViraj(e) {
    let raw = e.gamma || 0;
    let angle = raw - calibrationOffset;
    
    if (angle < -60) angle = -60;
    if (angle > 60) angle = 60;
    
    let absAngle = Math.round(Math.abs(angle));
    
    const dirEl = document.getElementById('direction');
    const fill = document.getElementById('gaugeFill');
    
    // Renk: açı arttıkça kırmızılaş
    const intensity = absAngle / 60; // 0-1
    const r = Math.round(255 * intensity);
    const g = Math.round(255 * (1 - intensity));
    const color = `rgb(${r}, ${g}, 0)`;
    
    if (angle < -3) {
        // SOL - ok sola döner
        dirEl.innerHTML = '← SOL';
        dirEl.className = 'direction dir-left';
        fill.style.borderTopColor = color;
    } else if (angle > 3) {
        // SAĞ - ok sağa döner  
        dirEl.innerHTML = 'SAĞ →';
        dirEl.className = 'direction dir-right';
        fill.style.borderTopColor = color;
    } else {
        dirEl.textContent = 'Düz';
        dirEl.className = 'direction dir-straight';
        fill.style.borderTopColor = '#ffaa00';
    }
    
    // Gauge: sol = -90deg, düz = 0deg, sağ = +90deg
    const rot = (angle / 60) * 90;
    document.getElementById('gaugeFill').style.transform = `rotate(${rot}deg)`;
    
    document.getElementById('angleDisplay').textContent = absAngle;
    
    if (angle < 0 && absAngle > maxLeft) {
        maxLeft = absAngle;
        updateVirajMax();
    }
    if (angle > 0 && absAngle > maxRight) {
        maxRight = absAngle;
        updateVirajMax();
    }
}

function updateVirajMax() {
    const maxSub = document.getElementById('maxSub');
    maxSub.innerHTML = `Sol ${maxLeft}° | Sağ ${maxRight}°`;
    const overallMax = Math.max(maxLeft, maxRight);
    document.getElementById('maxAngle').textContent = overallMax + '°';
}

function calibrate() {
    window.addEventListener('deviceorientation', function set(e) {
        if (currentMode === 'teker') {
            calibrationOffset = e.beta || 0;
        } else {
            calibrationOffset = e.gamma || 0;
        }
        window.removeEventListener('deviceorientation', set);
    }, { once: true });
}

function reset() {
    maxAngle = 0;
    maxLeft = 0;
    maxRight = 0;
    calibrationOffset = 0;
    
    document.getElementById('maxAngle').textContent = '0°';
    document.getElementById('angleDisplay').textContent = '0';
    document.getElementById('gaugeFill').style.transform = 'rotate(-90deg)';
    
    if (currentMode === 'teker') {
        document.getElementById('gaugeFill').style.borderTopColor = '#00ff88';
    } else {
        document.getElementById('gaugeFill').style.borderTopColor = '#ffaa00';
        document.getElementById('maxSub').textContent = '';
        document.getElementById('direction').textContent = 'Düz';
        document.getElementById('direction').className = 'direction dir-straight';
    }
}

function goToModeSelect() {
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('modeSelectScreen').classList.remove('hidden');
}
</script>

</body>
</html>
