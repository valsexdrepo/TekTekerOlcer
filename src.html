<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🏍️ Tek Teker Açı Ölçer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #startScreen, #mainScreen { text-align: center; width: 100%; }
        #mainScreen { display: none; }
        
        .big-number {
            font-size: 140px;
            font-weight: 900;
            line-height: 1;
        }
        .label {
            font-size: 20px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
        }
        .gauge {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 10px solid #222;
            position: relative;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gauge-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid transparent;
            border-top-color: #00ff88;
            transform: rotate(-90deg);
            transition: transform 0.1s;
        }
        .btn {
            padding: 20px 50px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: #00ff88;
            color: #000;
            cursor: pointer;
            margin: 10px;
            width: 280px;
        }
        .btn:disabled { background: #333; color: #666; }
        .btn-red {
            background: #ff4444;
            color: white;
        }
        .btn-blue {
            background: #4488ff;
            color: white;
        }
        
        .max-box {
            background: #1a1a1a;
            padding: 20px 40px;
            border-radius: 20px;
            margin: 20px auto;
            display: inline-block;
        }
        .max-value {
            font-size: 48px;
            font-weight: bold;
            color: #ffaa00;
        }
        .max-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 12px;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- BAŞLANGIÇ EKRANI -->
<div id="startScreen">
    <h1 style="font-size: 50px; margin-bottom: 10px;">🏍️</h1>
    <h2 style="margin-bottom: 40px; font-size: 28px;">Tek Teker Ölçer</h2>
    <button class="btn" id="startBtn" onclick="requestPermission()">BAŞLAT</button>
    <p id="status" style="margin-top: 30px; color: #666; font-size: 14px;"></p>
</div>

<!-- ANA EKRAN -->
<div id="mainScreen">
    <div class="gauge">
        <div class="gauge-fill" id="gaugeFill"></div>
        <div>
            <div class="big-number" id="angleDisplay">0</div>
            <div class="label">DERECE</div>
        </div>
    </div>
    
    <div class="max-box">
        <div class="max-value" id="maxAngle">0°</div>
        <div class="max-label">MAKS AÇI</div>
    </div>
    
    <div style="margin-top: 30px;">
        <button class="btn btn-blue" onclick="calibrate()">DENGELLE (KALİBRASYON)</button>
    </div>
    <div style="margin-top: 15px;">
        <button class="btn btn-red" onclick="reset()">SIFIRLA</button>
    </div>
</div>

<div class="footer">benden sıze kıyak :)</div>

<script>
let maxAngle = 0;
let calibrationOffset = 0;
let isRunning = false;

function updateStatus(msg) {
    document.getElementById('status').textContent = msg;
}

async function requestPermission() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    try {
        if (typeof DeviceOrientationEvent !== 'undefined' && 
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            updateStatus('İzin isteniyor...');
            const response = await DeviceOrientationEvent.requestPermission();
            if (response === 'granted') {
                startApp();
            } else {
                updateStatus('❌ İzin reddedildi! Ayarlardan izin vermelisiniz.');
                btn.disabled = false;
            }
        } else {
            startApp();
        }
    } catch (e) {
        updateStatus('❌ Hata: ' + e.message);
        btn.disabled = false;
    }
}

function startApp() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    window.addEventListener('deviceorientation', handleOrientation);
    isRunning = true;
}

function handleOrientation(event) {
    // beta: öne/arkaya eğim
    let rawAngle = event.beta || 0;
    
    // Kalibrasyon offset'ini uygula
    let angle = rawAngle - calibrationOffset;
    
    // Negatif değerleri pozitif yap, 0-90 aralığına sınırla
    angle = Math.abs(angle);
    if (angle > 90) angle = 90;
    
    // Tam sayıya yuvarla (kusuratsız)
    angle = Math.round(angle);
    
    // Ekran güncelle
    document.getElementById('angleDisplay').textContent = angle;
    
    // Gauge doldur (0-90 derece → 0-270 derece dönüş)
    const rotation = -90 + (angle / 90 * 270);
    document.getElementById('gaugeFill').style.transform = `rotate(${rotation}deg)`;
    
    // Max açı güncelle
    if (angle > maxAngle) {
        maxAngle = angle;
        document.getElementById('maxAngle').textContent = maxAngle + '°';
    }
}

function calibrate() {
    // Şu anki telefon açısını "0" olarak ayarla
    // Bir sonraki frame'de event.beta değerini offset olarak kullanacağız
    // Önce son bilinen beta değerini almamız lazım
    
    // Geçici olarak son okunan değeri saklayacağız
    // Bunun için önce bir kere daha okuyalım
    window.addEventListener('deviceorientation', function setCalibration(e) {
        calibrationOffset = e.beta || 0;
        window.removeEventListener('deviceorientation', setCalibration);
        
        // Maks açıyı da sıfırla (isteğe bağlı)
        // maxAngle = 0;
        // document.getElementById('maxAngle').textContent = '0°';
        
        // Kullanıcıya bildir
        alert('Kalibrasyon yapıldı! Şu anki pozisyon 0° olarak ayarlandı.');
    }, { once: true });
}

function reset() {
    maxAngle = 0;
    calibrationOffset = 0;
    document.getElementById('maxAngle').textContent = '0°';
    document.getElementById('angleDisplay').textContent = '0';
    document.getElementById('gaugeFill').style.transform = 'rotate(-90deg)';
}
</script>

</body>
</html>
