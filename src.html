<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tek Teker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }
        
        #startScreen, #mainScreen { 
            text-align: center; 
            width: 100%; 
            padding: 20px;
        }
        #mainScreen { display: none; }
        
        /* Başlangıç ekranı */
        .logo {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }
        
        /* Ana gösterge */
        .gauge-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }
        .gauge-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #1a1a1a;
        }
        .gauge-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid transparent;
            border-top-color: #00ff88;
            transform: rotate(-90deg);
            transition: transform 0.15s ease-out;
        }
        .gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .angle-num {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }
        .angle-unit {
            font-size: 14px;
            color: #888;
            font-weight: 500;
            margin-top: 2px;
        }
        
        /* Maks açı */
        .max-wrap {
            background: #111;
            border-radius: 16px;
            padding: 14px 28px;
            display: inline-block;
            margin-bottom: 25px;
        }
        .max-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .max-num {
            font-size: 32px;
            font-weight: 700;
            color: #ffaa00;
        }
        
        /* Butonlar */
        .btn {
            display: block;
            width: 200px;
            margin: 0 auto 10px;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-green {
            background: #00ff88;
            color: #000;
        }
        .btn-blue {
            background: #1a1a1a;
            color: #4488ff;
            border: 1px solid #222;
        }
        .btn-red {
            background: #1a1a1a;
            color: #ff4444;
            border: 1px solid #222;
        }
        
        /* Footer */
        .footer {
            position: fixed;
            bottom: 12px;
            font-size: 10px;
            color: #333;
            letter-spacing: 0.5px;
        }
        
        /* Durum mesajı */
        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #555;
            min-height: 20px;
        }
    </style>
</head>
<body>

<!-- BAŞLANGIÇ -->
<div id="startScreen">
    <div class="logo">🏍️</div>
    <div class="title">Tek Teker</div>
    <div class="subtitle">Açı ölçer</div>
    <button class="btn btn-green" id="startBtn" onclick="requestPermission()">Başlat</button>
    <div class="status" id="status"></div>
</div>

<!-- ANA EKRAN -->
<div id="mainScreen">
    <div class="gauge-wrap">
        <div class="gauge-bg"></div>
        <div class="gauge-fill" id="gaugeFill"></div>
        <div class="gauge-center">
            <div class="angle-num" id="angleDisplay">0</div>
            <div class="angle-unit">DERECE</div>
        </div>
    </div>
    
    <div class="max-wrap">
        <div class="max-label">Maks Açı</div>
        <div class="max-num" id="maxAngle">0°</div>
    </div>
    
    <button class="btn btn-blue" onclick="calibrate()">Dengele</button>
    <button class="btn btn-red" onclick="reset()">Sıfırla</button>
</div>

<div class="footer">valsesn</div>

<script>
let maxAngle = 0;
let calibrationOffset = 0;
let isRunning = false;

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

async function requestPermission() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    try {
        if (typeof DeviceOrientationEvent !== 'undefined' && 
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            setStatus('İzin isteniyor...');
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') {
                startApp();
            } else {
                setStatus('İzin reddedildi');
                btn.disabled = false;
            }
        } else {
            startApp();
        }
    } catch (e) {
        setStatus('Hata: ' + e.message);
        btn.disabled = false;
    }
}

function startApp() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    window.addEventListener('deviceorientation', handleOrientation);
    isRunning = true;
}

function handleOrientation(e) {
    let raw = e.beta || 0;
    let angle = raw - calibrationOffset;
    
    // Aşağı eğilince 0'da kal, negatif olmaz
    if (angle < 0) angle = 0;
    if (angle > 90) angle = 90;
    
    // Tam sayı
    angle = Math.round(angle);
    
    document.getElementById('angleDisplay').textContent = angle;
    
    // Gauge
    const rot = -90 + (angle / 90 * 270);
    document.getElementById('gaugeFill').style.transform = `rotate(${rot}deg)`;
    
    // Max
    if (angle > maxAngle) {
        maxAngle = angle;
        document.getElementById('maxAngle').textContent = maxAngle + '°';
    }
}

function calibrate() {
    // Şu anki açıyı 0 olarak ayarla
    window.addEventListener('deviceorientation', function set(e) {
        calibrationOffset = e.beta || 0;
        window.removeEventListener('deviceorientation', set);
    }, { once: true });
}

function reset() {
    maxAngle = 0;
    calibrationOffset = 0;
    document.getElementById('maxAngle').textContent = '0°';
    document.getElementById('angleDisplay').textContent = '0';
    document.getElementById('gaugeFill').style.transform = 'rotate(-90deg)';
}
</script>

</body>
</html>
