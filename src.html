<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tek Teker & Viraj</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            height: 100%;
            width: 100%;
            overflow: hidden;
            user-select: none;
            position: fixed;
        }
        
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .snowflake {
            position: absolute;
            top: -4px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
        
        .glow {
            position: fixed;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            transition: background 0.5s;
        }
        .glow.teker { background: #00ff88; }
        .glow.viraj { background: #ffaa00; }
        
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 12px;
            z-index: 1;
        }
        .screen.active { display: flex; }
        
        .logo {
            font-size: 40px;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 10px;
            color: #444;
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .mode-card {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 18px;
            margin: 6px 0;
            width: 220px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mode-card:active { transform: scale(0.96); }
        .mode-icon { font-size: 28px; margin-bottom: 6px; }
        .mode-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .mode-desc { font-size: 11px; color: #555; }
        
        /* === TEK TEKER GAUGE === */
        .gauge-wrap {
            position: relative;
            width: 170px;
            height: 85px;
            margin-bottom: 10px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .gauge-bg {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            bottom: 0;
            left: 0;
            border: 3px solid rgba(255,255,255,0.06);
        }
        .gauge-fill {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            bottom: 0;
            left: 0;
            background: conic-gradient(
                from 180deg,
                var(--gauge-color, #00ff88) 0deg,
                var(--gauge-color, #00ff88) var(--gauge-deg, 0deg),
                transparent var(--gauge-deg, 0deg),
                transparent 180deg
            );
            -webkit-mask: radial-gradient(transparent 58%, black 59%);
            mask: radial-gradient(transparent 58%, black 59%);
            transition: --gauge-deg 0.15s ease-out, --gauge-color 0.3s;
        }
        @property --gauge-deg {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        @property --gauge-color {
            syntax: '<color>';
            initial-value: #00ff88;
            inherits: false;
        }
        .gauge-inner {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .gauge-center {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
        }
        
        /* === VIRAJ - GAUGE YOK, SADECE BÜYÜK SAYI === */
        .viraj-display {
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .viraj-num {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -3px;
            transition: color 0.3s;
        }
        .viraj-label {
            font-size: 10px;
            color: #555;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .viraj-direction {
            font-size: 28px;
            font-weight: 800;
            margin-top: 8px;
            height: 36px;
            letter-spacing: 2px;
        }
        .viraj-dir-left { color: #4488ff; }
        .viraj-dir-right { color: #ff4444; }
        .viraj-dir-straight { color: #444; }
        
        /* Ortak metin stilleri */
        .angle-num {
            font-size: 44px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }
        .angle-unit {
            font-size: 9px;
            color: #555;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 1px;
        }
        
        .speed-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 6px 14px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .speed-label {
            font-size: 8px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .speed-num {
            font-size: 18px;
            font-weight: 800;
            color: #00ccff;
        }
        .speed-unit {
            font-size: 9px;
            color: #555;
            margin-left: 2px;
        }
        
        .max-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 8px 18px;
            margin-bottom: 8px;
            min-width: 140px;
            border: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .max-label {
            font-size: 8px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1px;
        }
        .max-num {
            font-size: 24px;
            font-weight: 800;
            color: #ffaa00;
        }
        .max-sub {
            font-size: 9px;
            color: #444;
            margin-top: 2px;
        }
        
        .btn {
            display: block;
            width: 180px;
            margin: 0 0 5px 0;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
        }
        .btn-blue {
            background: rgba(68,136,255,0.1);
            color: #4488ff;
            border: 1px solid rgba(68,136,255,0.15);
        }
        .btn-red {
            background: rgba(255,68,68,0.1);
            color: #ff4444;
            border: 1px solid rgba(255,68,68,0.15);
        }
        .btn-gray {
            background: rgba(255,255,255,0.03);
            color: #555;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 11px;
        }
        
        .mod-badge {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.04);
            padding: 4px 14px;
            border-radius: 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10;
        }
        .mod-badge.teker { color: #00ff88; }
        .mod-badge.viraj { color: #ffaa00; }
        
        .footer {
            position: fixed;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #222;
            letter-spacing: 1px;
            z-index: 1;
        }
        
        .status {
            margin-top: 10px;
            font-size: 11px;
            color: #444;
            min-height: 14px;
        }
    </style>
</head>
<body>

<div class="snow-container" id="snowContainer"></div>
<div class="glow teker" id="glow"></div>

<div class="screen active" id="startScreen">
    <div class="logo">🏍️</div>
    <div class="title">Tek Teker & Viraj</div>
    <div class="subtitle">Açı Ölçer</div>
    <button class="btn btn-green" id="startBtn" onclick="requestPermission()">Başlat</button>
    <div class="status" id="status"></div>
</div>

<div class="screen" id="modeSelectScreen">
    <div style="font-size: 32px; margin-bottom: 6px;">🏍️</div>
    <div style="font-size: 17px; font-weight: 700; margin-bottom: 3px;">Mod Seç</div>
    <div style="font-size: 10px; color: #555; margin-bottom: 20px;">Ölçüm modunu seçin</div>
    
    <div class="mode-card" onclick="selectMode('teker')">
        <div class="mode-icon">⬆️</div>
        <div class="mode-name">Tek Teker</div>
        <div class="mode-desc">Öne kalkış açısı</div>
    </div>
    
    <div class="mode-card" onclick="selectMode('viraj')">
        <div class="mode-icon">↔️</div>
        <div class="mode-name">Viraj</div>
        <div class="mode-desc">Sağ / sol yatış açısı</div>
    </div>
</div>

<!-- TEK TEKER EKRANI -->
<div class="screen" id="tekerScreen">
    <div class="mod-badge teker">Tek Teker</div>
    
    <div class="speed-wrap">
        <div class="speed-label">Hız</div>
        <div>
            <span class="speed-num" id="tekerSpeed">0</span>
            <span class="speed-unit">km/h</span>
        </div>
    </div>
    
    <div class="gauge-wrap">
        <div class="gauge-bg"></div>
        <div class="gauge-fill" id="tekerGauge"></div>
        <div class="gauge-inner"></div>
        <div class="gauge-center">
            <div class="angle-num" id="tekerAngle">0</div>
            <div class="angle-unit">Derece</div>
        </div>
    </div>
    
    <div class="max-wrap">
        <div class="max-label">Maks Açı</div>
        <div class="max-num" id="tekerMax">0°</div>
    </div>
    
    <button class="btn btn-blue" onclick="calibrate()">Dengele</button>
    <button class="btn btn-red" onclick="reset()">Sıfırla</button>
    <button class="btn btn-gray" onclick="goToModeSelect()">Mod Değiştir</button>
</div>

<!-- VIRAJ EKRANI -->
<div class="screen" id="virajScreen">
    <div class="mod-badge viraj">Viraj</div>
    
    <div class="speed-wrap">
        <div class="speed-label">Hız</div>
        <div>
            <span class="speed-num" id="virajSpeed">0</span>
            <span class="speed-unit">km/h</span>
        </div>
    </div>
    
    <div class="viraj-display">
        <div class="viraj-num" id="virajAngle">0</div>
        <div class="viraj-label">Derece</div>
        <div class="viraj-direction viraj-dir-straight" id="virajDir">Düz</div>
    </div>
    
    <div class="max-wrap">
        <div class="max-label">Maks Viraj</div>
        <div class="max-num" id="virajMax">0°</div>
        <div class="max-sub" id="virajMaxSub"></div>
    </div>
    
    <button class="btn btn-blue" onclick="calibrate()">Dengele</button>
    <button class="btn btn-red" onclick="reset()">Sıfırla</button>
    <button class="btn btn-gray" onclick="goToModeSelect()">Mod Değiştir</button>
</div>

<div class="footer">valsesn</div>

<script>
let currentMode = 'teker';
let maxAngle = 0;
let maxLeft = 0;
let maxRight = 0;
let calibrationOffset = 0;
let isRunning = false;
let permissionGranted = false;

function createSnowflakes() {
    const container = document.getElementById('snowContainer');
    for (let i = 0; i < 15; i++) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        const size = Math.random() * 1.5 + 0.5;
        flake.style.width = size + 'px';
        flake.style.height = size + 'px';
        flake.style.left = Math.random() * 100 + '%';
        flake.style.animationDuration = (Math.random() * 4 + 5) + 's';
        flake.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(flake);
    }
}
createSnowflakes();

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function requestPermission() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    
    if (typeof DeviceOrientationEvent === 'undefined' || 
        typeof DeviceOrientationEvent.requestPermission !== 'function') {
        permissionGranted = true;
        showScreen('modeSelectScreen');
        startGPS();
        return;
    }
    
    if (!permissionGranted) {
        try {
            setStatus('İzin isteniyor...');
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') {
                permissionGranted = true;
                showScreen('modeSelectScreen');
                startGPS();
            } else {
                setStatus('İzin reddedildi');
                btn.disabled = false;
            }
        } catch (e) {
            setStatus('Hata: ' + e.message);
            btn.disabled = false;
        }
    } else {
        showScreen('modeSelectScreen');
        startGPS();
    }
}

function startGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            updateSpeed(pos);
            navigator.geolocation.watchPosition(
                updateSpeed,
                () => {},
                { enableHighAccuracy: true, maximumAge: 500, timeout: 3000 }
            );
        },
        () => {},
        { enableHighAccuracy: true, timeout: 5000 }
    );
}

function updateSpeed(pos) {
    let speedMs = pos.coords.speed;
    let kmh = (speedMs === null || isNaN(speedMs)) ? 0 : Math.round(speedMs * 3.6);
    document.getElementById('tekerSpeed').textContent = kmh;
    document.getElementById('virajSpeed').textContent = kmh;
}

function selectMode(mode) {
    currentMode = mode;
    const glow = document.getElementById('glow');
    
    if (mode === 'teker') {
        glow.className = 'glow teker';
        showScreen('tekerScreen');
    } else {
        glow.className = 'glow viraj';
        showScreen('virajScreen');
    }
    
    reset();
    
    if (!isRunning) {
        window.addEventListener('deviceorientation', handleOrientation);
        isRunning = true;
    }
}

function handleOrientation(e) {
    if (currentMode === 'teker') {
        handleTeker(e);
    } else {
        handleViraj(e);
    }
}

function rgbToHex(r, g, b) {
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function getColor(intensity) {
    const r = Math.round(255 * intensity);
    const g = Math.round(255 * (1 - intensity));
    return rgbToHex(r, g, 0);
}

function setTekerGauge(deg, color) {
    const fill = document.getElementById('tekerGauge');
    fill.style.setProperty('--gauge-deg', deg + 'deg');
    fill.style.setProperty('--gauge-color', color);
}

function handleTeker(e) {
    let raw = e.beta || 0;
    let angle = raw - calibrationOffset;
    
    if (angle < 0) angle = 0;
    if (angle > 90) angle = 90;
    angle = Math.round(angle);
    
    const color = getColor(angle / 90);
    const gaugeDeg = (angle / 90) * 180;
    
    setTekerGauge(gaugeDeg, color);
    
    document.getElementById('tekerAngle').textContent = angle;
    
    if (angle > maxAngle) {
        maxAngle = angle;
        document.getElementById('tekerMax').textContent = maxAngle + '°';
    }
}

function handleViraj(e) {
    let raw = e.gamma || 0;
    let angle = raw - calibrationOffset;
    
    if (angle < -60) angle = -60;
    if (angle > 60) angle = 60;
    
    let absAngle = Math.round(Math.abs(angle));
    
    const dirEl = document.getElementById('virajDir');
    const numEl = document.getElementById('virajAngle');
    
    // Renk: sayı rengi değişsin
    const color = getColor(absAngle / 60);
    numEl.style.color = color;
    
    // Yön
    if (angle < -3) {
        dirEl.innerHTML = '← SOL';
        dirEl.className = 'viraj-direction viraj-dir-left';
    } else if (angle > 3) {
        dirEl.innerHTML = 'SAĞ →';
        dirEl.className = 'viraj-direction viraj-dir-right';
    } else {
        dirEl.textContent = 'Düz';
        dirEl.className = 'viraj-direction viraj-dir-straight';
        numEl.style.color = '#fff';
    }
    
    numEl.textContent = absAngle;
    
    if (angle < 0 && absAngle > maxLeft) {
        maxLeft = absAngle;
        updateVirajMax();
    }
    if (angle > 0 && absAngle > maxRight) {
        maxRight = absAngle;
        updateVirajMax();
    }
}

function updateVirajMax() {
    document.getElementById('virajMaxSub').textContent = `Sol ${maxLeft}° | Sağ ${maxRight}°`;
    document.getElementById('virajMax').textContent = Math.max(maxLeft, maxRight) + '°';
}

function calibrate() {
    window.addEventListener('deviceorientation', function set(e) {
        calibrationOffset = currentMode === 'teker' ? (e.beta || 0) : (e.gamma || 0);
        window.removeEventListener('deviceorientation', set);
    }, { once: true });
}

function reset() {
    maxAngle = 0;
    maxLeft = 0;
    maxRight = 0;
    calibrationOffset = 0;
    
    if (currentMode === 'teker') {
        document.getElementById('tekerMax').textContent = '0°';
        document.getElementById('tekerAngle').textContent = '0';
        setTekerGauge(0, '#00ff88');
    } else {
        document.getElementById('virajMax').textContent = '0°';
        document.getElementById('virajAngle').textContent = '0';
        document.getElementById('virajAngle').style.color = '#fff';
        document.getElementById('virajMaxSub').textContent = '';
        document.getElementById('virajDir').textContent = 'Düz';
        document.getElementById('virajDir').className = 'viraj-direction viraj-dir-straight';
    }
}

function goToModeSelect() {
    showScreen('modeSelectScreen');
}
</script>

</body>
</html>
