<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tek Teker & Viraj</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            height: 100%;
            width: 100%;
            overflow: hidden;
            user-select: none;
            position: fixed;
        }
        
        /* Kar taneleri */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .snowflake {
            position: absolute;
            top: -6px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            8% { opacity: 0.2; }
            92% { opacity: 0.2; }
            100% { transform: translateY(110vh) translateX(10px); opacity: 0; }
        }
        
        /* Glow */
        .glow {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            transition: background 0.5s;
        }
        .glow.teker { background: #00ff88; }
        .glow.viraj { background: #ffaa00; }
        
        /* Ekranlar */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            z-index: 1;
        }
        .screen.active { display: flex; }
        
        /* Başlangıç */
        .logo {
            font-size: 44px;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 3px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 10px;
            color: #555;
            margin-bottom: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* Mod kartları */
        .mode-card {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 16px;
            margin: 5px 0;
            width: 210px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mode-card:active { transform: scale(0.96); }
        .mode-icon { font-size: 26px; margin-bottom: 5px; }
        .mode-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
        .mode-desc { font-size: 10px; color: #555; }
        
        /* Gauge */
        .gauge-wrap {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .gauge-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.04);
        }
        .gauge-track {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(255,255,255,0.06);
            transform: rotate(-90deg);
        }
        .gauge-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00ff88;
            transform: rotate(-90deg);
            transition: transform 0.15s ease-out, border-top-color 0.3s;
        }
        .gauge-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 108px;
            height: 108px;
            border-radius: 50%;
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .angle-num {
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }
        .angle-unit {
            font-size: 9px;
            color: #555;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 1px;
        }
        
        /* Yön */
        .direction {
            font-size: 10px;
            font-weight: 700;
            margin-top: 2px;
            height: 13px;
            letter-spacing: 1px;
        }
        .dir-left { color: #4488ff; }
        .dir-right { color: #ff4444; }
        .dir-straight { color: #444; }
        
        /* Hız göstergesi */
        .speed-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 8px 16px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .speed-label {
            font-size: 8px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .speed-num {
            font-size: 20px;
            font-weight: 800;
            color: #00ccff;
        }
        .speed-unit {
            font-size: 10px;
            color: #555;
            margin-left: 2px;
        }
        
        /* Maks */
        .max-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 8px 18px;
            margin-bottom: 8px;
            min-width: 130px;
            border: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .max-label {
            font-size: 8px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1px;
        }
        .max-num {
            font-size: 22px;
            font-weight: 800;
            color: #ffaa00;
        }
        .max-sub {
            font-size: 9px;
            color: #444;
            margin-top: 2px;
        }
        
        /* Butonlar */
        .btn {
            display: block;
            width: 170px;
            margin: 0 0 5px 0;
            padding: 9px 0;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
        }
        .btn-blue {
            background: rgba(68,136,255,0.1);
            color: #4488ff;
            border: 1px solid rgba(68,136,255,0.15);
        }
        .btn-red {
            background: rgba(255,68,68,0.1);
            color: #ff4444;
            border: 1px solid rgba(255,68,68,0.15);
        }
        .btn-gray {
            background: rgba(255,255,255,0.03);
            color: #555;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 11px;
        }
        
        /* Mod badge */
        .mod-badge {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.04);
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10;
        }
        .mod-badge.teker { color: #00ff88; }
        .mod-badge.viraj { color: #ffaa00; }
        
        /* Footer */
        .footer {
            position: fixed;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #222;
            letter-spacing: 1px;
            z-index: 1;
        }
        
        /* Durum */
        .status {
            margin-top: 10px;
            font-size: 11px;
            color: #444;
            min-height: 14px;
        }
    </style>
</head>
<body>

<div class="snow-container" id="snowContainer"></div>
<div class="glow teker" id="glow"></div>

<!-- BAŞLANGIÇ -->
<div class="screen active" id="startScreen">
    <div class="logo">🏍️</div>
    <div class="title">Tek Teker & Viraj</div>
    <div class="subtitle">Açı Ölçer</div>
    <button class="btn btn-green" id="startBtn" onclick="requestPermission()">Başlat</button>
    <div class="status" id="status"></div>
</div>

<!-- MOD SEÇİM -->
<div class="screen" id="modeSelectScreen">
    <div style="font-size: 30px; margin-bottom: 5px;">🏍️</div>
    <div style="font-size: 16px; font-weight: 700; margin-bottom: 3px;">Mod Seç</div>
    <div style="font-size: 10px; color: #555; margin-bottom: 18px;">Ölçüm modunu seçin</div>
    
    <div class="mode-card" onclick="selectMode('teker')">
        <div class="mode-icon">⬆️</div>
        <div class="mode-name">Tek Teker</div>
        <div class="mode-desc">Öne kalkış açısı</div>
    </div>
    
    <div class="mode-card" onclick="selectMode('viraj')">
        <div class="mode-icon">↔️</div>
        <div class="mode-name">Viraj</div>
        <div class="mode-desc">Sağ / sol yatış açısı</div>
    </div>
</div>

<!-- ANA EKRAN -->
<div class="screen" id="mainScreen">
    <div class="mod-badge teker" id="modBadge">Tek Teker</div>
    
    <!-- GPS Hız -->
    <div class="speed-wrap">
        <div class="speed-label">Hız</div>
        <div>
            <span class="speed-num" id="speedDisplay">0</span>
            <span class="speed-unit">km/h</span>
        </div>
    </div>
    
    <div class="gauge-wrap">
        <div class="gauge-bg"></div>
        <div class="gauge-track"></div>
        <div class="gauge-fill" id="gaugeFill"></div>
        <div class="gauge-inner"></div>
        <div class="gauge-center">
            <div class="angle-num" id="angleDisplay">0</div>
            <div class="angle-unit" id="angleUnit">Derece</div>
            <div class="direction" id="direction"></div>
        </div>
    </div>
    
    <div class="max-wrap">
        <div class="max-label" id="maxLabel">Maks Açı</div>
        <div class="max-num" id="maxAngle">0°</div>
        <div class="max-sub" id="maxSub"></div>
    </div>
    
    <button class="btn btn-blue" onclick="calibrate()">Dengele</button>
    <button class="btn btn-red" onclick="reset()">Sıfırla</button>
    <button class="btn btn-gray" onclick="goToModeSelect()">Mod Değiştir</button>
</div>

<div class="footer">valsesn</div>

<script>
let currentMode = 'teker';
let maxAngle = 0;
let maxLeft = 0;
let maxRight = 0;
let calibrationOffset = 0;
let isRunning = false;
let permissionGranted = false;
let lastSpeed = 0;

function createSnowflakes() {
    const container = document.getElementById('snowContainer');
    for (let i = 0; i < 18; i++) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        const size = Math.random() * 1.5 + 1;
        flake.style.width = size + 'px';
        flake.style.height = size + 'px';
        flake.style.left = Math.random() * 100 + '%';
        flake.style.animationDuration = (Math.random() * 5 + 4) + 's';
        flake.style.animationDelay = Math.random() * 6 + 's';
        container.appendChild(flake);
    }
}
createSnowflakes();

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function requestPermission() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    
    if (typeof DeviceOrientationEvent === 'undefined' || 
        typeof DeviceOrientationEvent.requestPermission !== 'function') {
        permissionGranted = true;
        showScreen('modeSelectScreen');
        startGPS();
        return;
    }
    
    if (!permissionGranted) {
        try {
            setStatus('İzin isteniyor...');
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') {
                permissionGranted = true;
                showScreen('modeSelectScreen');
                startGPS();
            } else {
                setStatus('İzin reddedildi');
                btn.disabled = false;
            }
        } catch (e) {
            setStatus('Hata: ' + e.message);
            btn.disabled = false;
        }
    } else {
        showScreen('modeSelectScreen');
        startGPS();
    }
}

function startGPS() {
    if (!navigator.geolocation) return;
    
    navigator.geolocation.watchPosition(
        (pos) => {
            const speedMs = pos.coords.speed;
            if (speedMs !== null && !isNaN(speedMs)) {
                // m/s → km/h, sapma yok direkt değer
                lastSpeed = Math.round(speedMs * 3.6);
            }
            document.getElementById('speedDisplay').textContent = lastSpeed;
        },
        (err) => {
            console.log('GPS hatası:', err);
        },
        {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 5000
        }
    );
}

function selectMode(mode) {
    currentMode = mode;
    showScreen('mainScreen');
    
    const badge = document.getElementById('modBadge');
    const glow = document.getElementById('glow');
    const maxLabel = document.getElementById('maxLabel');
    const angleUnit = document.getElementById('angleUnit');
    const maxSub = document.getElementById('maxSub');
    const direction = document.getElementById('direction');
    const fill = document.getElementById('gaugeFill');
    
    if (mode === 'teker') {
        badge.textContent = 'Tek Teker';
        badge.className = 'mod-badge teker';
        glow.className = 'glow teker';
        maxLabel.textContent = 'Maks Açı';
        angleUnit.textContent = 'Derece';
        maxSub.textContent = '';
        direction.textContent = '';
        direction.className = 'direction';
        fill.style.borderTopColor = '#00ff88';
    } else {
        badge.textContent = 'Viraj';
        badge.className = 'mod-badge viraj';
        glow.className = 'glow viraj';
        maxLabel.textContent = 'Maks Viraj';
        angleUnit.textContent = 'Derece';
        direction.textContent = 'Düz';
        direction.className = 'direction dir-straight';
        fill.style.borderTopColor = '#ffaa00';
    }
    
    reset();
    
    if (!isRunning) {
        window.addEventListener('deviceorientation', handleOrientation);
        isRunning = true;
    }
}

function handleOrientation(e) {
    if (currentMode === 'teker') {
        handleTeker(e);
    } else {
        handleViraj(e);
    }
}

function getColorForAngle(angle, maxAngle) {
    // 0° = yeşil, maxAngle° = kırmızı
    const intensity = Math.min(angle / maxAngle, 1);
    const r = Math.round(255 * intensity);
    const g = Math.round(255 * (1 - intensity));
    return `rgb(${r}, ${g}, 0)`;
}

function handleTeker(e) {
    let raw = e.beta || 0;
    let angle = raw - calibrationOffset;
    
    if (angle < 0) angle = 0;
    if (angle > 90) angle = 90;
    
    angle = Math.round(angle);
    
    const fill = document.getElementById('gaugeFill');
    const color = getColorForAngle(angle, 90);
    fill.style.borderTopColor = color;
    
    document.getElementById('angleDisplay').textContent = angle;
    const rot = -90 + (angle / 90 * 270);
    fill.style.transform = `rotate(${rot}deg)`;
    
    if (angle > maxAngle) {
        maxAngle = angle;
        document.getElementById('maxAngle').textContent = maxAngle + '°';
    }
}

function handleViraj(e) {
    let raw = e.gamma || 0;
    let angle = raw - calibrationOffset;
    
    // Sınırlandır
    if (angle < -60) angle = -60;
    if (angle > 60) angle = 60;
    
    let absAngle = Math.round(Math.abs(angle));
    
    const dirEl = document.getElementById('direction');
    const fill = document.getElementById('gaugeFill');
    
    // Renk: açı arttıkça kırmızılaş
    const color = getColorForAngle(absAngle, 60);
    fill.style.borderTopColor = color;
    
    if (angle < -3) {
        dirEl.innerHTML = '← SOL';
        dirEl.className = 'direction dir-left';
    } else if (angle > 3) {
        dirEl.innerHTML = 'SAĞ →';
        dirEl.className = 'direction dir-right';
    } else {
        dirEl.textContent = 'Düz';
        dirEl.className = 'direction dir-straight';
    }
    
    // Gauge: ortada başlar (-60 = -135deg, 0 = -90deg, 60 = -45deg)
    // Yani: -90 + (angle/60 * 45)
    const rot = -90 + (angle / 60 * 45);
    fill.style.transform = `rotate(${rot}deg)`;
    
    document.getElementById('angleDisplay').textContent = absAngle;
    
    if (angle < 0 && absAngle > maxLeft) {
        maxLeft = absAngle;
        updateVirajMax();
    }
    if (angle > 0 && absAngle > maxRight) {
        maxRight = absAngle;
        updateVirajMax();
    }
}

function updateVirajMax() {
    document.getElementById('maxSub').textContent = `Sol ${maxLeft}° | Sağ ${maxRight}°`;
    const overallMax = Math.max(maxLeft, maxRight);
    document.getElementById('maxAngle').textContent = overallMax + '°';
}

function calibrate() {
    window.addEventListener('deviceorientation', function set(e) {
        if (currentMode === 'teker') {
            calibrationOffset = e.beta || 0;
        } else {
            calibrationOffset = e.gamma || 0;
        }
        window.removeEventListener('deviceorientation', set);
    }, { once: true });
}

function reset() {
    maxAngle = 0;
    maxLeft = 0;
    maxRight = 0;
    calibrationOffset = 0;
    
    document.getElementById('maxAngle').textContent = '0°';
    document.getElementById('angleDisplay').textContent = '0';
    document.getElementById('gaugeFill').style.transform = 'rotate(-90deg)';
    
    if (currentMode === 'teker') {
        document.getElementById('gaugeFill').style.borderTopColor = '#00ff88';
    } else {
        document.getElementById('gaugeFill').style.borderTopColor = '#ffaa00';
        document.getElementById('maxSub').textContent = '';
        document.getElementById('direction').textContent = 'Düz';
        document.getElementById('direction').className = 'direction dir-straight';
    }
}

function goToModeSelect() {
    showScreen('modeSelectScreen');
}
</script>

</body>
</html>
